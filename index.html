<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Terminal Antigo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="terminal">
    <div id="login">
      <p>SISTEMA OPERACIONAL ARC-80</p>
      <p>ACESSO RESTRITO</p>

      <label for="password">SENHA:</label>
      <input id="password" type="password" autofocus>

      <p id="message"></p>
    </div>

    <div id="screen" class="hidden">
      <h1>BANCO DE DADOS LOCAL</h1>
      <h2>ARQUIVOS CONFIDENCIAIS</h2>

      <div id="list"></div>

      <p class="cursor">C:\ARQUIVOS&gt;</p>
    </div>
  </div>

  <div class="scanlines"></div>

  <script src="script.js"></script>
</body>
</html>
